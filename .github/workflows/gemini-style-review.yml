name: Gemini Style Review
# Checks documentation files changed in a PR against Business App style
# guidelines using Gemini CLI and posts inline comments with committable
# suggestion blocks directly on the PR diff.
#
# Requires:
#   GEMINI_API_KEY -- Google AI Studio API key, set as a repository secret.
#
# Models:
#   Primary:  GEMINI_MODEL (gemini-3-flash-preview)
#   Fallback: GEMINI_FALLBACK_MODEL (gemini-2.5-flash)
#   The fallback is used automatically on non-zero exit or empty/error response.
#
# Limitations:
#   - Forked PRs: GITHUB_TOKEN is read-only for forks; the job is skipped
#     silently via the `if:` condition on the job.
#   - Lines not in the diff: findings on lines outside diff hunks are listed
#     in the review body instead of as inline comments.

on:
  pull_request:
    types: [opened]
    paths:
      - 'docusaurus/docs/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string
      additional_context:
        description: 'Additional instructions from @mention comment'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write

jobs:
  style-review:
    name: Gemini style review
    runs-on: ubuntu-latest
    # Forked PRs cannot receive inline comments -- GITHUB_TOKEN is read-only.
    # workflow_dispatch is always allowed (triggered by dispatch workflow).
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        github.event_name == 'workflow_dispatch'
      )
    env:
      GEMINI_MODEL: gemini-3-flash-preview
      GEMINI_FALLBACK_MODEL: gemini-2.5-flash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Stylosaurus app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.STYLOSAURUS_APP_ID }}
          private-key: ${{ secrets.STYLOSAURUS_PRIVATE_KEY }}

      - name: Find changed documentation files
        id: changed-files
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_REF: ${{ github.base_ref || 'master' }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            # For @mention dispatch: get changed files from PR API
            gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" \
              --json files --jq '.files[].path' \
              | grep -E '^docusaurus/docs/.*\.(md|mdx)$' > /tmp/changed-docs.txt || true
          else
            bash .claude/skills/style-review/scripts/find-modified-docs.sh \
              "origin/${BASE_REF}" > /tmp/changed-docs.txt
          fi
          if [ -s /tmp/changed-docs.txt ]; then
            echo "no_files=false" >> "$GITHUB_OUTPUT"
            # Build space-separated file list for the prompt.
            FILE_LIST=$(paste -sd ' ' /tmp/changed-docs.txt)
            echo "file_list=${FILE_LIST}" >> "$GITHUB_OUTPUT"
            FILE_COUNT=$(wc -l < /tmp/changed-docs.txt | tr -d ' ')
            echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
            echo "Changed documentation files (${FILE_COUNT}):"
            cat /tmp/changed-docs.txt
          else
            echo "no_files=true" >> "$GITHUB_OUTPUT"
            echo "No documentation files changed -- skipping style review."
          fi

      - name: Run Gemini style review
        if: steps.changed-files.outputs.no_files == 'false'
        uses: google-github-actions/run-gemini-cli@v1
        id: gemini-review
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ env.GEMINI_MODEL }}
          prompt: |
            Read the ci-style-review skill at .gemini/skills/ci-style-review/SKILL.md and follow it exactly.
            Files to review: ${{ steps.changed-files.outputs.file_list }}
            ${{ inputs.additional_context && format('Additional instructions from the reviewer: {0}', inputs.additional_context) || '' }}
          settings: '{"experimental": {"enableAgents": true}}'

      - name: Fallback model on failure
        if: steps.changed-files.outputs.no_files == 'false' && (failure() || steps.gemini-review.outputs.response == '')
        uses: google-github-actions/run-gemini-cli@v1
        id: gemini-fallback
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ env.GEMINI_FALLBACK_MODEL }}
          prompt: |
            Read the ci-style-review skill at .gemini/skills/ci-style-review/SKILL.md and follow it exactly.
            Files to review: ${{ steps.changed-files.outputs.file_list }}
            ${{ inputs.additional_context && format('Additional instructions from the reviewer: {0}', inputs.additional_context) || '' }}
          settings: '{"experimental": {"enableAgents": true}}'

      - name: Post PR review
        if: steps.changed-files.outputs.no_files == 'false' && (steps.gemini-review.outputs.response != '' || steps.gemini-fallback.outputs.response != '')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          FILE_COUNT: ${{ steps.changed-files.outputs.file_count }}
          RESPONSE: ${{ steps.gemini-review.outputs.response || steps.gemini-fallback.outputs.response }}
        run: |
          set -euo pipefail

          echo "::debug::RESPONSE length: $(printf '%s' "${RESPONSE}" | wc -c)"

          # -- Extract and normalize findings ----------------------------------
          # Extract the text field from the JSON wrapper; fall back to raw if
          # the CLI did not wrap output in a JSON envelope.
          FINDINGS_RAW=$(printf '%s' "${RESPONSE}" | jq -r '.response' 2>/dev/null \
            || printf '%s' "${RESPONSE}")

          echo "::debug::FINDINGS_RAW (first 500): $(printf '%s' "${FINDINGS_RAW}" | head -c 500)"

          # Strip markdown code fences if the model wrapped its output.
          FINDINGS_RAW=$(printf '%s' "${FINDINGS_RAW}" | sed '/^```/d')

          # Try direct JSON parse; fall back to Python-based array extraction
          # for responses where prose appears before or after the JSON array.
          if ! FINDINGS=$(printf '%s' "${FINDINGS_RAW}" | jq -c '.' 2>/dev/null); then
            cat > /tmp/extract-json.py << 'PYEOF'
          import sys, json
          text = sys.stdin.read().strip()
          start = text.find('[')
          end = text.rfind(']')
          if start >= 0 and end > start:
              try:
                  data = json.loads(text[start:end + 1])
                  if isinstance(data, list):
                      print(json.dumps(data))
                      sys.exit(0)
              except Exception:
                  pass
          print('[]')
          PYEOF
            FINDINGS=$(printf '%s' "${FINDINGS_RAW}" | python3 /tmp/extract-json.py 2>/dev/null) || FINDINGS="[]"
          fi

          # Schema validation: drop findings missing required fields or wrong types.
          FINDINGS=$(printf '%s' "${FINDINGS}" | jq -c '[.[] | select(
            (.file | type == "string" and length > 0) and
            (.line | type == "number" and . > 0) and
            (.issue | type == "string" and length > 0) and
            (.original | type == "string" and length > 0) and
            (.replacement | type == "string" and length > 0)
          )]' 2>/dev/null || echo "[]")

          echo "::debug::FINDINGS after schema validation: ${FINDINGS}"

          # -- Validate line numbers against actual file content ----------------
          # Verify each finding's "original" text appears at the claimed line.
          # Corrects line number if found nearby (+/-3 lines); drops if not found.
          cat > /tmp/validate-findings.py << 'PYEOF'
          import sys, json
          findings = json.load(sys.stdin)
          validated = []
          for f in findings:
              fp = f.get('file', ''); ln = int(f.get('line', 0)); orig = f.get('original', '')
              try:
                  lines = open(fp).readlines()
              except OSError:
                  print('::warning::Dropping finding -- file not found: ' + fp, file=sys.stderr)
                  continue
              def matches(n, lines=lines, orig=orig):
                  return 0 < n <= len(lines) and orig in lines[n - 1]
              if matches(ln):
                  validated.append(f)
              else:
                  corrected = next((ln + d for d in [-1, 1, -2, 2, -3, 3] if matches(ln + d)), None)
                  if corrected is not None:
                      f['line'] = corrected; validated.append(f)
                  else:
                      print('::warning::Dropping finding -- original text not found near ' + fp + ':' + str(ln), file=sys.stderr)
          print(json.dumps(validated))
          PYEOF
          FINDINGS=$(printf '%s' "${FINDINGS}" | python3 /tmp/validate-findings.py) || FINDINGS="[]"

          # -- Fetch PR diff line ranges ----------------------------------------
          # GitHub only allows inline comments on lines within diff hunks.
          # Pre-filter findings so the API call never fails with 422.
          gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate > /tmp/pr-files.json

          cat > /tmp/split-findings.py << 'PYEOF'
          import sys, json, re
          pr_files = json.load(open('/tmp/pr-files.json'))
          findings = json.load(sys.stdin)
          diff_lines = {}
          for f in pr_files:
              fn = f['filename']
              patch = f.get('patch', '')
              if not patch:
                  continue
              lines = set()
              cur = 0
              for pl in patch.split('\n'):
                  m = re.match(r'^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@', pl)
                  if m:
                      cur = int(m.group(1))
                      continue
                  if pl.startswith('-'):
                      continue
                  if pl.startswith('+') or pl.startswith(' '):
                      lines.add(cur)
                      cur += 1
              diff_lines[fn] = lines
          inline_f, body_f = [], []
          for f in findings:
              if f['line'] in diff_lines.get(f['file'], set()):
                  inline_f.append(f)
              else:
                  body_f.append(f)
          print(json.dumps({'inline': inline_f, 'body': body_f}))
          PYEOF

          # -- Build severity counts and post PR review -------------------------
          if printf '%s' "${FINDINGS}" | jq -e 'type == "array"' > /dev/null 2>&1; then
            SPLIT=$(printf '%s' "${FINDINGS}" | python3 /tmp/split-findings.py)
            INLINE_FINDINGS=$(printf '%s' "${SPLIT}" | jq -c '.inline')
            BODY_FINDINGS=$(printf '%s' "${SPLIT}" | jq -c '.body')
            INLINE_COUNT=$(printf '%s' "${INLINE_FINDINGS}" | jq 'length')
            BODY_COUNT=$(printf '%s' "${BODY_FINDINGS}" | jq 'length')

            echo "::debug::Inline-eligible findings: ${INLINE_COUNT}, body-only: ${BODY_COUNT}"

            ISSUE_COUNT=$(printf '%s' "${FINDINGS}" | jq 'length')
            BLOCKER_COUNT=$(printf '%s' "${FINDINGS}" | jq '[.[] | select(.severity == "blocker")] | length')
            WARNING_COUNT=$(printf '%s' "${FINDINGS}" | jq '[.[] | select(.severity == "warning")] | length')
            SUGGESTION_COUNT=$(printf '%s' "${FINDINGS}" | jq '[.[] | select(.severity == "suggestion")] | length')
            REVIEW_EVENT=$([ "${BLOCKER_COUNT}" -gt 0 ] && echo "REQUEST_CHANGES" || echo "COMMENT")

            # Nothing to report -- exit cleanly.
            if [ "${ISSUE_COUNT}" -eq 0 ]; then
              echo "No style issues found. No review posted."
              exit 0
            fi

            # Build review body with intro and severity summary table.
            BODY="Automated style review of ${FILE_COUNT} file(s) found ${ISSUE_COUNT} issue(s).

          ## Gemini style review

          | Severity | Count |
          |----------|-------|
          | Blocker | ${BLOCKER_COUNT} |
          | Warning | ${WARNING_COUNT} |
          | Suggestion | ${SUGGESTION_COUNT} |"

            if [ "${BLOCKER_COUNT}" -gt 0 ]; then
              BODY="${BODY}

          **${BLOCKER_COUNT} blocker(s) need to be fixed before this can merge.**"
            fi

            # Append out-of-diff findings to the review body.
            if [ "${BODY_COUNT}" -gt 0 ]; then
              BODY_BLOCKER_ITEMS=$(printf '%s' "${BODY_FINDINGS}" | jq -r \
                '.[] | select(.severity == "blocker") | "- `\(.file)` line \(.line): **\(.issue)**\n  > `\(.original)`\n  > Fix: `\(.replacement)`"')
              BODY_WARNING_ITEMS=$(printf '%s' "${BODY_FINDINGS}" | jq -r \
                '.[] | select(.severity == "warning") | "- `\(.file)` line \(.line): **\(.issue)**\n  > `\(.original)`\n  > Fix: `\(.replacement)`"')
              BODY_SUGGESTION_ITEMS=$(printf '%s' "${BODY_FINDINGS}" | jq -r \
                '.[] | select(.severity == "suggestion") | "- `\(.file)` line \(.line): **\(.issue)**\n  > `\(.original)`\n  > Fix: `\(.replacement)`"')

              BODY="${BODY}

          ---
          **${BODY_COUNT} issue(s) outside the diff** (shown here because inline comments require lines in the diff):"

              [ -n "${BODY_BLOCKER_ITEMS}" ] && BODY="${BODY}

          #### Blockers
          ${BODY_BLOCKER_ITEMS}"

              [ -n "${BODY_WARNING_ITEMS}" ] && BODY="${BODY}

          #### Warnings
          ${BODY_WARNING_ITEMS}"

              [ -n "${BODY_SUGGESTION_ITEMS}" ] && BODY="${BODY}

          #### Suggestions
          ${BODY_SUGGESTION_ITEMS}"
            fi

            # Build inline comments only for findings whose lines are in the diff.
            # Includes the reason (if present) below the severity badge.
            if [ "${INLINE_COUNT}" -gt 0 ]; then
              COMMENTS=$(printf '%s' "${INLINE_FINDINGS}" | jq -c '[.[] | {
                path: .file,
                line: .line,
                side: "RIGHT",
                body: (
                  (if .reason and (.reason | length > 0)
                   then .reason
                   else ("**" + .issue + "**")
                   end)
                  + "\n\n> **" + (
                    if .severity == "blocker" then "Blocker** -- must fix before merging."
                    elif .severity == "warning" then "Warning**"
                    else "Suggestion**"
                    end
                  )
                  + "\n\n```suggestion\n" + .replacement + "\n```"
                )
              }]')
            else
              COMMENTS="[]"
            fi

            jq -n \
              --arg body "${BODY}" \
              --arg event "${REVIEW_EVENT}" \
              --arg commit_id "${PR_HEAD_SHA}" \
              --argjson comments "${COMMENTS}" \
              '{body: $body, event: $event, commit_id: $commit_id, comments: $comments}' > /tmp/review.json

            gh api \
              --method POST \
              "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --input /tmp/review.json

          else
            # Gemini returned output that could not be parsed as JSON.
            # Post the raw response so findings are not silently lost.
            TRUNCATED=$(printf '%s' "${RESPONSE}" | head -c 10000)
            gh api \
              --method POST \
              "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --field body="**Gemini style review** -- output could not be parsed. Raw Gemini output:

          \`\`\`
          ${TRUNCATED}
          \`\`\`" \
              --field event="COMMENT"
          fi

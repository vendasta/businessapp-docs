name: Gemini Style Review
# Checks documentation files changed in a PR against Business App style
# guidelines using Gemini CLI and posts inline comments with committable
# suggestion blocks directly on the PR diff.
#
# Setup (repository secrets required):
#   GEMINI_API_KEY          -- Google AI Studio API key. The workflow skips
#                             gracefully if this is not configured.
#   STYLOSAURUS_APP_ID      -- GitHub App ID for a GitHub App with pull-request
#                             write permission, used to post inline review comments.
#   STYLOSAURUS_PRIVATE_KEY -- Private key for the GitHub App above.
#
# Models:
#   Primary:  GEMINI_MODEL (gemini-3-flash-preview)
#   Fallback: GEMINI_FALLBACK_MODEL (gemini-2.5-flash)
#   The fallback is used automatically on non-zero exit or empty/error response.
#
# Limitations:
#   - Forked PRs: GITHUB_TOKEN is read-only for forks; the job is skipped
#     silently via the `if:` condition on the job.
#   - Lines not in the diff: findings on lines outside diff hunks are listed
#     in the review body instead of as inline comments.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - 'docusaurus/docs/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (used by gemini-dispatch.yml)'
        required: true
        type: string
      additional_context:
        description: 'Extra reviewer instructions from the @stylosaurus comment'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: style-review-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  style-review:
    name: Gemini style review
    runs-on: ubuntu-latest
    # Forked PRs cannot receive inline comments -- GITHUB_TOKEN is read-only.
    # Draft PRs are skipped -- review fires when the PR becomes ready.
    # workflow_dispatch (from gemini-dispatch.yml) always runs.
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.draft != true
      ) || (
        github.event_name == 'workflow_dispatch'
      )
    env:
      GEMINI_MODEL: gemini-3-flash-preview
      GEMINI_FALLBACK_MODEL: gemini-2.5-flash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Stylosaurus app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.STYLOSAURUS_APP_ID }}
          private-key: ${{ secrets.STYLOSAURUS_PRIVATE_KEY }}

      - name: Check if triggered by bot commit
        if: github.event_name == 'pull_request'
        id: bot-check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          AUTHOR=$(gh api "/repos/${REPO}/commits/${HEAD_SHA}" --jq '.author.login // empty')
          if [ "${AUTHOR}" = "stylosaurus[bot]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping -- commit authored by stylosaurus[bot] (suggestion apply)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find changed documentation files
        if: steps.bot-check.outputs.skip != 'true'
        id: changed-files
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_REF: ${{ github.base_ref || 'master' }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            # For @mention dispatch: get changed files from PR API
            gh pr view "${PR_NUMBER}" --repo "${REPO}" \
              --json files --jq '.files[].path' \
              | grep -E '^docusaurus/docs/.*\.(md|mdx)$' > /tmp/changed-docs.txt || true
          else
            bash .claude/skills/style-review/scripts/find-modified-docs.sh \
              "origin/${BASE_REF}" > /tmp/changed-docs.txt
          fi
          if [ -s /tmp/changed-docs.txt ]; then
            echo "no_files=false" >> "$GITHUB_OUTPUT"
            # Build space-separated file list for the prompt.
            FILE_LIST=$(paste -sd ' ' /tmp/changed-docs.txt)
            echo "file_list=${FILE_LIST}" >> "$GITHUB_OUTPUT"
            FILE_COUNT=$(wc -l < /tmp/changed-docs.txt | tr -d ' ')
            echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
            echo "Changed documentation files (${FILE_COUNT}):"
            cat /tmp/changed-docs.txt
          else
            echo "no_files=true" >> "$GITHUB_OUTPUT"
            echo "No documentation files changed -- skipping style review."
          fi

      - name: Collect dismissed suggestions
        if: steps.bot-check.outputs.skip != 'true' && steps.changed-files.outputs.no_files == 'false'
        id: dismissed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch review threads via GraphQL (REST does not expose isResolved).
          OWNER="${REPO%%/*}"
          REPO_NAME="${REPO##*/}"
          # Paginate through all review threads (GraphQL returns max 100 per page).
          CURSOR=""
          echo '[]' > /tmp/all-threads.json
          while true; do
            CURSOR_ARG=""
            if [ -n "${CURSOR}" ]; then
              CURSOR_ARG="-f cursor=${CURSOR}"
            fi
            gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $cursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        isResolved
                        path
                        line
                        comments(first: 20) {
                          nodes { body author { login } }
                        }
                      }
                    }
                  }
                }
              }
            ' -f owner="${OWNER}" -f repo="${REPO_NAME}" -F pr="${PR_NUMBER}" \
              ${CURSOR_ARG} > /tmp/threads-page.json 2>/dev/null || break

            # Merge nodes into accumulated list.
            jq -s '.[0] + (.[1].data.repository.pullRequest.reviewThreads.nodes // [])' \
              /tmp/all-threads.json /tmp/threads-page.json > /tmp/all-threads-tmp.json
            mv /tmp/all-threads-tmp.json /tmp/all-threads.json

            # Check for next page.
            HAS_NEXT=$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage' /tmp/threads-page.json)
            if [ "${HAS_NEXT}" != "true" ]; then
              break
            fi
            CURSOR=$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor' /tmp/threads-page.json)
          done

          # Wrap in the structure the Python script expects.
          jq '{data:{repository:{pullRequest:{reviewThreads:{nodes:.}}}}}' \
            /tmp/all-threads.json > /tmp/review-threads.json

          if [ ! -s /tmp/review-threads.json ]; then
            echo "No review threads found (new PR or API error)."
            echo "has_dismissed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > /tmp/collect-dismissed.py << 'PYEOF'
          import sys, json, re, os

          data = json.load(open('/tmp/review-threads.json'))
          threads = (data.get('data', {}).get('repository', {})
                         .get('pullRequest', {}).get('reviewThreads', {})
                         .get('nodes', []))

          dismissed = []
          for t in threads:
              comments = t.get('comments', {}).get('nodes', [])
              if not comments:
                  continue
              first = comments[0]
              if first.get('author', {}).get('login') != 'stylosaurus[bot]':
                  continue

              is_resolved = t.get('isResolved', False)
              has_human_reply = any(
                  c.get('author', {}).get('login') != 'stylosaurus[bot]'
                  for c in comments[1:]
              )
              if not (is_resolved or has_human_reply):
                  continue

              # Extract the replacement text from the suggestion block.
              body = first.get('body', '')
              m = re.search(r'```suggestion\n(.+?)\n```', body, re.DOTALL)
              if not m:
                  continue
              replacement = m.group(1)

              # Check if the suggestion was applied (replacement is in the file).
              file_path = t.get('path', '')
              line_num = t.get('line', 0)
              try:
                  lines = open(file_path).readlines()
                  content = ''.join(lines)
                  if replacement.rstrip('\n') in content:
                      continue  # Applied, not dismissed.
              except OSError:
                  continue

              # Capture the original text at the dismissed line (still present
              # because the suggestion was not applied).
              original_text = ''
              if 0 < line_num <= len(lines):
                  original_text = lines[line_num - 1].rstrip('\n')

              # Collect the author's reason (first human reply, or generic).
              reason = 'Resolved without comment'
              for c in comments[1:]:
                  if c.get('author', {}).get('login') != 'stylosaurus[bot]':
                      reason = c.get('body', reason)[:200]
                      break

              dismissed.append({
                  'path': file_path,
                  'line': line_num,
                  'original': original_text,
                  'replacement': replacement,
                  'reason': reason,
              })

          if dismissed:
              with open('/tmp/dismissed-suggestions.json', 'w') as f:
                  json.dump(dismissed, f)
              print(f'Found {len(dismissed)} dismissed suggestion(s).')
          else:
              print('No dismissed suggestions found.')
          PYEOF
          python3 /tmp/collect-dismissed.py

          if [ -f /tmp/dismissed-suggestions.json ]; then
            echo "has_dismissed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dismissed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Gemini CLI
        if: steps.bot-check.outputs.skip != 'true' && steps.changed-files.outputs.no_files == 'false'
        run: |
          npm install --silent --no-audit --global @google/gemini-cli@~0.33
          gemini --version

      - name: Configure Gemini settings
        if: steps.bot-check.outputs.skip != 'true' && steps.changed-files.outputs.no_files == 'false'
        run: |
          mkdir -p .gemini
          echo '{"experimental": {"enableAgents": true}}' > .gemini/settings.json

      - name: Run Gemini style review
        if: steps.bot-check.outputs.skip != 'true' && steps.changed-files.outputs.no_files == 'false'
        id: gemini-review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL: ${{ env.GEMINI_MODEL }}
          FILE_LIST: ${{ steps.changed-files.outputs.file_list }}
          ADDITIONAL_CONTEXT: ${{ inputs.additional_context || '' }}
        run: |
          # Abort gracefully if GEMINI_API_KEY is not configured yet.
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY secret is not configured -- skipping style review."
            exit 0
          fi

          PROMPT="Read the ci-style-review skill at .gemini/skills/ci-style-review/SKILL.md and follow it exactly.
          Files to review: ${FILE_LIST}"
          if [ -n "${ADDITIONAL_CONTEXT}" ]; then
            PROMPT="${PROMPT}
          Additional instructions from the reviewer: ${ADDITIONAL_CONTEXT}"
          fi
          # Append dismissed suggestions so Gemini avoids re-flagging them.
          if [ -f /tmp/dismissed-suggestions.json ]; then
            DISMISSED_TEXT=$(python3 -c "
          import json
          items = json.load(open('/tmp/dismissed-suggestions.json'))
          for d in items:
              print(f\"- {d['path']} line {d['line']}: author said: {d['reason']}\")
          " 2>/dev/null || true)
            if [ -n "${DISMISSED_TEXT}" ]; then
              PROMPT="${PROMPT}

          The following issues were previously flagged and the PR author chose to keep them. Do NOT re-flag these:
          ${DISMISSED_TEXT}"
            fi
          fi

          gemini --model "${MODEL}" \
            --output-format json \
            --prompt "${PROMPT}" > /tmp/gemini-primary.json 2>/tmp/gemini-primary.log || true

          if [ -s /tmp/gemini-primary.json ]; then
            echo "Primary model produced output ($(wc -c < /tmp/gemini-primary.json) bytes)."
          else
            echo "Primary model produced no output."
            cat /tmp/gemini-primary.log || true
          fi

      - name: Fallback model on failure
        if: steps.bot-check.outputs.skip != 'true' && steps.changed-files.outputs.no_files == 'false' && !cancelled()
        id: gemini-fallback
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL: ${{ env.GEMINI_FALLBACK_MODEL }}
          FILE_LIST: ${{ steps.changed-files.outputs.file_list }}
          ADDITIONAL_CONTEXT: ${{ inputs.additional_context || '' }}
        run: |
          # Only run fallback if primary output is empty or invalid JSON
          if [ -s /tmp/gemini-primary.json ] && jq -e '.' /tmp/gemini-primary.json > /dev/null 2>&1; then
            echo "Primary output is valid -- skipping fallback."
            exit 0
          fi

          echo "Primary output missing or invalid -- running fallback model."

          PROMPT="Read the ci-style-review skill at .gemini/skills/ci-style-review/SKILL.md and follow it exactly.
          Files to review: ${FILE_LIST}"
          if [ -n "${ADDITIONAL_CONTEXT}" ]; then
            PROMPT="${PROMPT}
          Additional instructions from the reviewer: ${ADDITIONAL_CONTEXT}"
          fi
          if [ -f /tmp/dismissed-suggestions.json ]; then
            DISMISSED_TEXT=$(python3 -c "
          import json
          items = json.load(open('/tmp/dismissed-suggestions.json'))
          for d in items:
              print(f\"- {d['path']} line {d['line']}: author said: {d['reason']}\")
          " 2>/dev/null || true)
            if [ -n "${DISMISSED_TEXT}" ]; then
              PROMPT="${PROMPT}

          The following issues were previously flagged and the PR author chose to keep them. Do NOT re-flag these:
          ${DISMISSED_TEXT}"
            fi
          fi

          gemini --model "${MODEL}" \
            --output-format json \
            --prompt "${PROMPT}" > /tmp/gemini-fallback.json 2>/tmp/gemini-fallback.log || true

          if [ -s /tmp/gemini-fallback.json ]; then
            echo "Fallback model produced output ($(wc -c < /tmp/gemini-fallback.json) bytes)."
          else
            echo "Fallback model produced no output."
            cat /tmp/gemini-fallback.log || true
          fi

      - name: Dismiss previous Stylosaurus reviews
        if: steps.bot-check.outputs.skip != 'true' && steps.changed-files.outputs.no_files == 'false' && !cancelled()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          # Dismiss any previous CHANGES_REQUESTED reviews from stylosaurus so only the latest review blocks.
          gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" --paginate \
            | jq -r '.[] | select(.user.login == "stylosaurus[bot]" and .state == "CHANGES_REQUESTED") | .id' \
            | while read -r REVIEW_ID; do
                echo "Dismissing review ${REVIEW_ID}"
                gh api --method PUT \
                  "/repos/${REPO}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/dismissals" \
                  -f message="Superseded by newer review." \
                  -f event="DISMISS" || true
              done

      - name: Post PR review
        if: steps.bot-check.outputs.skip != 'true' && steps.changed-files.outputs.no_files == 'false' && !cancelled()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          FILE_COUNT: ${{ steps.changed-files.outputs.file_count }}
        run: |
          set -euo pipefail

          # -- Read Gemini output from temp files --------------------------------
          if [ -s /tmp/gemini-primary.json ]; then
            RESPONSE=$(cat /tmp/gemini-primary.json)
          elif [ -s /tmp/gemini-fallback.json ]; then
            RESPONSE=$(cat /tmp/gemini-fallback.json)
          else
            echo "No Gemini output available from either model."
            exit 1
          fi

          echo "::debug::RESPONSE length: $(printf '%s' "${RESPONSE}" | wc -c)"

          # Log the model name for observability.
          echo "Gemini model: $(printf '%s' "${RESPONSE}" | jq -r '.model // "unknown"' 2>/dev/null)"

          # -- Extract and normalize findings ----------------------------------
          # Extract the text field from the JSON wrapper; fall back to raw if
          # the CLI did not wrap output in a JSON envelope.
          FINDINGS_RAW=$(printf '%s' "${RESPONSE}" | jq -r '.response' 2>/dev/null \
            || printf '%s' "${RESPONSE}")

          echo "::debug::FINDINGS_RAW (first 500): $(printf '%s' "${FINDINGS_RAW}" | head -c 500)"

          # Strip markdown code fences if the model wrapped its output.
          FINDINGS_RAW=$(printf '%s' "${FINDINGS_RAW}" | sed '/^```/d')

          # Try direct JSON parse; fall back to Python-based array extraction
          # for responses where prose appears before or after the JSON array.
          if ! FINDINGS=$(printf '%s' "${FINDINGS_RAW}" | jq -c '.' 2>/dev/null); then
            cat > /tmp/extract-json.py << 'PYEOF'
          import sys, json
          text = sys.stdin.read().strip()
          start = text.find('[')
          end = text.rfind(']')
          if start >= 0 and end > start:
              try:
                  data = json.loads(text[start:end + 1])
                  if isinstance(data, list):
                      print(json.dumps(data))
                      sys.exit(0)
              except Exception:
                  pass
          print('[]')
          PYEOF
            FINDINGS=$(printf '%s' "${FINDINGS_RAW}" | python3 /tmp/extract-json.py 2>/dev/null) || FINDINGS="[]"
          fi

          # Schema validation: drop findings missing required fields or wrong types.
          FINDINGS=$(printf '%s' "${FINDINGS}" | jq -c '[.[] | select(
            (.file | type == "string" and length > 0) and
            (.line | type == "number" and . > 0) and
            (.issue | type == "string" and length > 0) and
            (.original | type == "string" and length > 0) and
            (.replacement | type == "string" and length > 0)
          )]' 2>/dev/null || echo "[]")

          echo "::debug::FINDINGS after schema validation: ${FINDINGS}"

          # -- Validate line numbers against actual file content ----------------
          # Verify each finding's "original" text appears at the claimed line.
          # Corrects line number if found nearby (+/-3 lines); drops if not found.
          cat > /tmp/validate-findings.py << 'PYEOF'
          import sys, json
          findings = json.load(sys.stdin)
          validated = []
          for f in findings:
              fp = f.get('file', ''); ln = int(f.get('line', 0)); orig = f.get('original', '')
              try:
                  lines = open(fp).readlines()
              except OSError:
                  print('::warning::Dropping finding -- file not found: ' + fp, file=sys.stderr)
                  continue
              def matches(n, lines=lines, orig=orig):
                  return 0 < n <= len(lines) and orig in lines[n - 1]
              if matches(ln):
                  validated.append(f)
              else:
                  corrected = next((ln + d for d in [-1, 1, -2, 2, -3, 3] if matches(ln + d)), None)
                  if corrected is not None:
                      f['line'] = corrected; validated.append(f)
                  else:
                      print('::warning::Dropping finding -- original text not found near ' + fp + ':' + str(ln), file=sys.stderr)
          print(json.dumps(validated))
          PYEOF
          FINDINGS=$(printf '%s' "${FINDINGS}" | python3 /tmp/validate-findings.py) || FINDINGS="[]"

          # -- Fetch PR diff line ranges ----------------------------------------
          # GitHub only allows inline comments on lines within diff hunks.
          # Pre-filter findings so the API call never fails with 422.
          gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate > /tmp/pr-files.json

          cat > /tmp/split-findings.py << 'PYEOF'
          import sys, json, re
          pr_files = json.load(open('/tmp/pr-files.json'))
          findings = json.load(sys.stdin)
          diff_lines = {}
          for f in pr_files:
              fn = f['filename']
              patch = f.get('patch', '')
              if not patch:
                  continue
              lines = set()
              cur = 0
              for pl in patch.split('\n'):
                  m = re.match(r'^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@', pl)
                  if m:
                      cur = int(m.group(1))
                      continue
                  if pl.startswith('-'):
                      continue
                  if pl.startswith('+') or pl.startswith(' '):
                      lines.add(cur)
                      cur += 1
              diff_lines[fn] = lines
          inline_f, body_f = [], []
          for f in findings:
              if f['line'] in diff_lines.get(f['file'], set()):
                  inline_f.append(f)
              else:
                  body_f.append(f)
          print(json.dumps({'inline': inline_f, 'body': body_f}))
          PYEOF

          # -- Build severity counts and post PR review -------------------------
          if printf '%s' "${FINDINGS}" | jq -e 'type == "array"' > /dev/null 2>&1; then

            # Deduplicate: drop findings whose replacement text was already
            # suggested by stylosaurus[bot] on the same file.  Content-based
            # matching is immune to line-number drift caused by edits above
            # previously-flagged lines.
            gh api "/repos/${REPO}/pulls/${PR_NUMBER}/comments" \
              | jq '[.[] | select(.user.login == "stylosaurus[bot]")]' > /tmp/existing-comments.json

            # Also fetch previous review bodies for body-finding dedup.
            gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" --paginate \
              | jq '[.[] | select(.user.login == "stylosaurus[bot]") | {body}]' > /tmp/existing-reviews.json

            cat > /tmp/dedup-findings.py << 'PYEOF'
          import sys, json, re, os

          existing_raw = json.load(open('/tmp/existing-comments.json'))
          reviews_raw = json.load(open('/tmp/existing-reviews.json'))
          findings = json.load(sys.stdin)

          # --- Build dedup indexes ---

          # 1. Exact replacement match: (file, replacement)
          existing_replacements = set()
          for c in existing_raw:
              m = re.search(r'```suggestion\n(.+?)\n```', c.get('body', ''), re.DOTALL)
              if m:
                  existing_replacements.add((c['path'], m.group(1)))

          # 2. File + line match for inline comments (same line already commented on)
          existing_file_lines = set()
          for c in existing_raw:
              path = c.get('path', '')
              line = c.get('line') or c.get('original_line') or c.get('position')
              if path and line:
                  existing_file_lines.add((path, int(line)))

          # 3. Original-text match: (file, original) -- catches replacement-text drift
          existing_originals = set()

          # Extract file + replacement + original pairs from previous review bodies.
          # Body findings format: - `file` line N: ...
          #   > `original text`
          #   > Fix: `replacement`
          body_repl_pattern = re.compile(r'- `([^`]+)` line \d+: .+\n\s*> `[^`]+`\n\s*> Fix: `([^`]+)`')
          body_orig_pattern = re.compile(r'- `([^`]+)` line \d+: .+\n\s*> `([^`]+)`')
          for r in reviews_raw:
              body = r.get('body', '') or ''
              for m in body_repl_pattern.finditer(body):
                  existing_replacements.add((m.group(1), m.group(2)))
              for m in body_orig_pattern.finditer(body):
                  existing_originals.add((m.group(1), m.group(2)))

          # Load dismissed suggestions (resolved threads / human replies).
          dismissed = []
          if os.path.isfile('/tmp/dismissed-suggestions.json'):
              dismissed = json.load(open('/tmp/dismissed-suggestions.json'))

          deduped = []
          for f in findings:
              file_path = f['file']
              replacement = f['replacement']
              orig = f.get('original', '')
              f_line = f.get('line', 0)

              # Drop if replacement was already suggested on the same file.
              if (file_path, replacement) in existing_replacements:
                  continue

              # Drop if the same original text was already flagged on the same file
              # (catches cases where Gemini generates different replacement wording).
              if orig and (file_path, orig) in existing_originals:
                  print('::notice::Skipping (original-text match): '
                        + file_path + ':' + str(f_line), file=sys.stderr)
                  continue

              # Drop if the same file+line was already commented on by stylosaurus
              # (weaker signal, but prevents re-flagging the exact same line).
              if (file_path, f_line) in existing_file_lines:
                  print('::notice::Skipping (file+line match): '
                        + file_path + ':' + str(f_line), file=sys.stderr)
                  continue

              # Drop if the finding matches a dismissed suggestion on the same
              # file, near the same line.  Uses line proximity (within 5 lines)
              # as primary match plus text as confirmation, so common phrases
              # like "Click Save" dismissed on one line don't suppress unrelated
              # findings on a different line.
              is_dismissed = any(
                  d['path'] == file_path
                  and abs(f_line - d.get('line', 0)) <= 5
                  and orig and d.get('original', '')
                  and (orig in d['original'] or d['original'] in orig)
                  for d in dismissed
              )
              if is_dismissed:
                  print('::notice::Skipping dismissed finding: '
                        + file_path + ':' + str(f_line), file=sys.stderr)
                  continue

              deduped.append(f)

          print(json.dumps(deduped))
          PYEOF
            FINDINGS=$(printf '%s' "${FINDINGS}" | python3 /tmp/dedup-findings.py) || FINDINGS="[]"

            SPLIT=$(printf '%s' "${FINDINGS}" | python3 /tmp/split-findings.py)
            INLINE_FINDINGS=$(printf '%s' "${SPLIT}" | jq -c '.inline')
            BODY_FINDINGS_ALL=$(printf '%s' "${SPLIT}" | jq -c '.body')
            # Only surface blockers for lines outside the diff — warnings and
            # suggestions on unchanged lines are noise for the PR author.
            BODY_FINDINGS=$(printf '%s' "${BODY_FINDINGS_ALL}" | jq -c '[.[] | select(.severity == "blocker")]')
            BODY_SUPPRESSED=$(printf '%s' "${BODY_FINDINGS_ALL}" | jq '[.[] | select(.severity != "blocker")] | length')
            INLINE_COUNT=$(printf '%s' "${INLINE_FINDINGS}" | jq 'length')
            BODY_COUNT=$(printf '%s' "${BODY_FINDINGS}" | jq 'length')

            echo "::debug::Inline-eligible findings: ${INLINE_COUNT}, body-only blockers: ${BODY_COUNT}, body-only suppressed: ${BODY_SUPPRESSED}"

            # Combine inline findings (all severities) + body findings (blockers only)
            # for accurate reported counts.
            REPORTED_FINDINGS=$(jq -n --argjson i "${INLINE_FINDINGS}" --argjson b "${BODY_FINDINGS}" '$i + $b')
            BLOCKER_COUNT=$(printf '%s' "${REPORTED_FINDINGS}" | jq '[.[] | select(.severity == "blocker")] | length')
            WARNING_COUNT=$(printf '%s' "${REPORTED_FINDINGS}" | jq '[.[] | select(.severity == "warning")] | length')
            SUGGESTION_COUNT=$(printf '%s' "${REPORTED_FINDINGS}" | jq '[.[] | select(.severity == "suggestion")] | length')
            REVIEW_EVENT=$([ "${BLOCKER_COUNT}" -gt 0 ] && echo "REQUEST_CHANGES" || echo "COMMENT")

            # Reported count excludes suppressed out-of-diff non-blockers.
            REPORTED_COUNT=$(( INLINE_COUNT + BODY_COUNT ))

            # Nothing to report -- exit cleanly.
            if [ "${REPORTED_COUNT}" -eq 0 ]; then
              echo "No reportable style issues found (${BODY_SUPPRESSED} non-blocker(s) on unchanged lines omitted). No review posted."
              exit 0
            fi

            # Build review body with intro and severity summary table.
            BODY="Automated style review of ${FILE_COUNT} file(s) found ${REPORTED_COUNT} issue(s).

          ## Gemini style review

          | Severity | Count |
          |----------|-------|
          | Blocker | ${BLOCKER_COUNT} |
          | Warning | ${WARNING_COUNT} |
          | Suggestion | ${SUGGESTION_COUNT} |"

            if [ "${BLOCKER_COUNT}" -gt 0 ]; then
              BODY="${BODY}

          **${BLOCKER_COUNT} blocker(s) need to be fixed before this can merge.**"
            fi

            # Append out-of-diff blocker findings to the review body.
            # Non-blocker findings on unchanged lines are suppressed to reduce noise.
            if [ "${BODY_COUNT}" -gt 0 ]; then
              BODY_BLOCKER_ITEMS=$(printf '%s' "${BODY_FINDINGS}" | jq -r \
                '.[] | "- `\(.file)` line \(.line): **\(.issue)**\n  > `\(.original)`\n  > Fix: `\(.replacement)`"')

              BODY="${BODY}

          ---
          **${BODY_COUNT} blocker(s) outside the diff** (shown here because inline comments require lines in the diff):

          ${BODY_BLOCKER_ITEMS}"
            fi

            if [ "${BODY_SUPPRESSED}" -gt 0 ]; then
              BODY="${BODY}

          _${BODY_SUPPRESSED} non-blocker issue(s) on unchanged lines were omitted. Run the style-review skill locally to see all findings._"
            fi

            # Add batch-apply tip only when there are inline suggestions.
            if [ "${INLINE_COUNT}" -gt 0 ]; then
              BODY="${BODY}

          ---
          **Tip:** Use **Add suggestion to batch** on each suggestion, then **Commit suggestions** once to apply them in a single commit."
            fi

            # Build inline comments only for findings whose lines are in the diff.
            # Includes the reason (if present) below the severity badge.
            if [ "${INLINE_COUNT}" -gt 0 ]; then
              COMMENTS=$(printf '%s' "${INLINE_FINDINGS}" | jq -c '[.[] | {
                path: .file,
                line: .line,
                side: "RIGHT",
                body: (
                  (if .reason and (.reason | length > 0)
                   then .reason
                   else ("**" + .issue + "**")
                   end)
                  + "\n\n> **" + (
                    if .severity == "blocker" then "Blocker** -- must fix before merging."
                    elif .severity == "warning" then "Warning**"
                    else "Suggestion**"
                    end
                  )
                  + "\n\n```suggestion\n" + .replacement + "\n```"
                )
              }]')
            else
              COMMENTS="[]"
            fi

            jq -n \
              --arg body "${BODY}" \
              --arg event "${REVIEW_EVENT}" \
              --arg commit_id "${PR_HEAD_SHA}" \
              --argjson comments "${COMMENTS}" \
              '{body: $body, event: $event, commit_id: $commit_id, comments: $comments}' > /tmp/review.json

            gh api \
              --method POST \
              "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --input /tmp/review.json

          else
            # Gemini returned output that could not be parsed as JSON.
            # Post the raw response so findings are not silently lost.
            TRUNCATED=$(printf '%s' "${RESPONSE}" | head -c 10000)
            gh api \
              --method POST \
              "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --field body="**Gemini style review** -- output could not be parsed. Raw Gemini output:

          \`\`\`
          ${TRUNCATED}
          \`\`\`" \
              --field event="COMMENT"
          fi
